<svg xmlns="http://www.w3.org/2000/svg" width="115" height="32" viewBox="0 0 115 32" fill="none">
  <!-- SharePoint Icon (as requested in the attached image) -->
  <g transform="translate(1, 0)">
    <!-- Top Circle (Darkest Teal) -->
    <circle cx="19" cy="11.5" r="7.2" fill="#005b60" />
    
    <!-- Right Circle (Medium Teal) -->
    <circle cx="23.5" cy="17" r="7.2" fill="#00828a" />
    
    <!-- Bottom Circle (Vibrant Light Teal) -->
    <circle cx="18" cy="22.5" r="6.2" fill="#20b2aa" />
    
    <!-- Front Rounded Square (Main SharePoint Teal) -->
    <rect x="5.5" y="8" width="16" height="16" rx="3.5" fill="#00787e" />
    
    <!-- White Letter "S" inside the card -->
    <text x="13.5" y="20.2" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#ffffff" text-anchor="middle" letter-spacing="-0.02em">S</text>
  </g>

  <!-- Typography: Microsoft 365 -->
  <text x="34" y="21" font-family="'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif" font-weight="700" font-size="12.5" fill="#1e293b" letter-spacing="-0.02em">Microsoft 365</text>
</svg>
