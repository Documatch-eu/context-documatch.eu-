<svg xmlns="http://www.w3.org/2000/svg" width="160" height="32" viewBox="0 0 160 32" fill="none">
  <!-- Gradients for OpenKM Brand Colors -->
  <defs>
    <linearGradient id="openkmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#559cb8" />
      <stop offset="100%" stop-color="#1b5a7a" />
    </linearGradient>
  </defs>

  <!-- Left Icon Group: 3D Isometric Folder/Cube Structure -->
  <g transform="translate(1, 0)">
    <!-- Left wing: Solid gradient filled hexagon face -->
    <path d="M 14,3.5 L 5,9.5 L 5,22.5 L 14,28.5 Z" fill="url(#openkmGrad)" />
    
    <!-- Left wing: High-fidelity white inner folder contour cutout -->
    <path d="M 14,10 L 9,13 L 9,21 L 14,24" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" fill="none" opacity="0.9" />

    <!-- Right wing: Clean dark-blue outer outline -->
    <path d="M 16,3.5 L 25,9.5 L 25,22.5 L 16,28.5" stroke="#043252" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none" />
    
    <!-- Right wing: Clean light-blue inner folder contour cutout -->
    <path d="M 16,10 L 21,13 L 21,21 L 16,24" stroke="#3fa9cc" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" fill="none" />
  </g>

  <!-- Typography: openkm -->
  <text x="31" y="21.5" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-weight="800" font-size="21.5" letter-spacing="-0.04em">
    <tspan fill="#043252">open</tspan>
    <tspan fill="#3fa9cc">km</tspan>
  </text>

  <!-- Subtitle: KnowledgeManagement -->
  <text x="50" y="30" font-family="'Segoe UI', -apple-system, system-ui, sans-serif" font-weight="600" font-size="7.5" fill="#3fa9cc" letter-spacing="0.04em">KnowledgeManagement</text>
</svg>
